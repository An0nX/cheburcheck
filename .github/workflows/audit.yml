name: "Security Audit"

on:
  push:
    branches: [master]
    paths:
      - '.github/workflows/audit.yml'
      - '**/Cargo.toml'
      - '**/Cargo.lock'
      - '**/audit.toml'
  pull_request:
    branches: [master]
    paths:
      - '**/Cargo.toml'
      - '**/Cargo.lock'
      - '**/audit.toml'
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  audit:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - uses: actions/checkout@v6

      - uses: actions-rust-lang/audit@v1
        name: Audit Rust Dependencies
        with:
          # TOKEN нужен для создания/обновления issues
          TOKEN: ${{ secrets.GITHUB_TOKEN }}

          # Создавать issues для найденных уязвимостей
          # По умолчанию true только на main/master
          createIssues: true

          # Превращать warnings в ошибки (yanked crates, unmaintained и т.д.)
          # denyWarnings: true

          # Игнорировать конкретные RUSTSEC (через запятую)
          # ignore: RUSTSEC-2020-0036,RUSTSEC-2021-0145

          # Путь к Cargo.lock (если не в корне)
          # file: Cargo.lock

          # Рабочая директория (если Cargo.lock не в корне)
          # workingDirectory: .
